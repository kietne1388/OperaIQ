name: Deploy Frontend to Firebase Hosting

on:
  push:
    branches: [main, master]
    paths:
      - 'operaiq.client/**'
      - 'firebase.json'
      - '.firebaserc'

jobs:
  deploy:
    name: Deploy to Firebase Hosting
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: operaiq.client/package-lock.json

      - name: Install dependencies
        working-directory: operaiq.client
        run: npm ci

      - name: Build production bundle
        working-directory: operaiq.client
        run: npm run build
        env:
          VITE_API_BASE_URL: https://operaiq.fly.dev
          VITE_SIGNALR_HUB_URL: https://operaiq.fly.dev/notificationHub

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          channelId: live
          projectId: opera-ai-b0fea
