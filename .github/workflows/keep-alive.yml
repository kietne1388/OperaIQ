name: Keep Alive - Ping Backend 24/7

on:
  schedule:
    # Ping mỗi 14 phút để Render không sleep (free tier sleep sau 15 phút)
    - cron: '*/14 * * * *'
  workflow_dispatch:   # Cho phép chạy tay

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend health endpoint
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://operaiq-backend.onrender.com/api/health)
          echo "Health check status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "WARNING: Backend returned $STATUS"
          else
            echo "✅ Backend is alive!"
          fi
