services:
  # =====================================================
  # Backend: ASP.NET Core .NET 10
  # =====================================================
  - type: web
    name: operaiq-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    region: singapore

    # Health check cho Render
    healthCheckPath: /api/health

    # Không bao giờ sleep (dùng cron job ping giữ sống)
    autoDeploy: true

    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: ASPNETCORE_URLS
        value: http://+:8080
      - key: PORT
        value: 8080

      # Các biến SECRET – điền trong Render Dashboard
      - key: DATABASE_URL
        sync: false          # Bạn tự điền trên Render Dashboard
      - key: JWT__SECRET
        sync: false
      - key: CLAUDE__APIKEY
        sync: false
      - key: GEMINI__APIKEY
        sync: false
      - key: GEMINISETTINGS__APIKEY
        sync: false
